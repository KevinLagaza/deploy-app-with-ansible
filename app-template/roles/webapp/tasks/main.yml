---
# Define variables
- name: Set nginx_root_location for RedHat
  set_fact:
    nginx_root_location: "/usr/share/nginx/html"
  when: ansible_os_family == "RedHat"

- name: Set nginx_root_location for Debian
  set_fact:
    nginx_root_location: "/var/www/html"
  when: ansible_os_family == "Debian"

- name: Create webapp directory on host
  ansible.builtin.file:
    path: "{{ nginx_root_location }}"
    state: directory
    mode: '0755'

# Install dependencies
- name: Install unzip
  package:
    name: unzip
    state: present

- name: Install EPEL
  yum:
    name: epel-release
    update_cache: yes
    state: present
  when: ansible_distribution == 'CentOS'

- name: Template index.html to target
  ansible.builtin.template:
    src: index.html-easter_egg.j2
    dest: "{{ nginx_root_location }}/index.html"
    mode: '0644'
  notify: Restart webapp container

# Deploy the stack playbook game
- name: Copy playbook stacker archive
  ansible.builtin.copy:
    src: playbook_stacker.zip
    dest: /tmp/playbook_stacker.zip
    mode: '0644'

- name: Unarchive playbook stacker game
  ansible.builtin.unarchive:
    src: /tmp/playbook_stacker.zip
    dest: "{{ nginx_root_location }}"
    remote_src: yes
    mode: '0755'
  notify: Restart webapp container

- name: Stop and remove existing webapp container
  docker_container:
    name: webapp
    state: absent

- name: Run webapp container
  community.docker.docker_container:
    name: webapp
    image: nginx:1.29.7-alpine
    state: started
    restart_policy: unless-stopped
    image_name_mismatch: recreate
    networks:
      - name: custom_net
    volumes:
      - "{{ nginx_root_location }}:/usr/share/nginx/html:ro"

# Verify the deployment
- name: Wait for proxy to be ready
  ansible.builtin.wait_for:
    port: "{{ app_port }}"
    delay: 3
    timeout: 15

- name: Verify application is accessible
  ansible.builtin.uri:
    url: "http://localhost:{{ app_port }}"
    status_code: 200
  register: health_check
  retries: 3
  delay: 5
  until: health_check.status == 200

- name: Display deployment status
  ansible.builtin.debug:
    msg: |
      Deployment successful!
      Application URL: http://{{ ansible_default_ipv4.address }}:{{ app_port }}
      Architecture: nginx-proxy:{{ app_port }} to webapp:80

...


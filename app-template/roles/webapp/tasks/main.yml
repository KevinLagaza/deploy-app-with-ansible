---
# Define variables
- name: Set nginx_root_location for RedHat
  set_fact:
    nginx_root_location: "/usr/share/nginx/html"
  when: ansible_os_family == "RedHat"

- name: Set nginx_root_location for Debian
  set_fact:
    nginx_root_location: "/var/www/html"
  when: ansible_os_family == "Debian"

# Create the directory
- name: Create webapp directory
  ansible.builtin.file:
    path: "{{ nginx_root_location }}"
    state: directory
    mode: '0755'

# Install dependencies
- name: Install unzip
  package:
    name: unzip
    state: latest

- name: Install EPEL
  yum:
    name: epel-release
    update_cache: yes
    state: latest
  when: ansible_distribution == 'CentOS'

# Deploy the stack playbook game
- name: Copy playbook stacker archive
  ansible.builtin.copy:
    src: playbook_stacker.zip
    dest: /tmp/playbook_stacker.zip
    mode: '0644'

- name: Unarchive playbook stacker game
  ansible.builtin.unarchive:
    src: /tmp/playbook_stacker.zip
    dest: "{{ nginx_root_location }}"
    remote_src: yes
    mode: '0755'
  notify: Restart nginx container

# Verify the deployment
- name: Verify application is accessible
  ansible.builtin.uri:
    url: "http://localhost"
    status_code: 200
  register: health_check
  retries: 3
  delay: 5
  until: health_check.status == 200

- name: Display deployment status
  ansible.builtin.debug:
    msg: "Application deployed successfully at http://{{ ansible_default_ipv4.address }}"

...

